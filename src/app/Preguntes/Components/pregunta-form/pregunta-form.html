<form class="o-form-box" [formGroup]="preguntaForm" (ngSubmit)="submit()">
        
    <app-text-area 
        label="Escribe el texto que acompañará la pregunta: " 
        name="text" 
        [control]="text"
        placeholder="Escribe aquí el texto que aparecerá como explicación, acompañando la pregunta." 
        errorMessage="{{ getErrorMessage(text, 'Texto de la pregunta') }}" 
        required="required" 
        class="c-textarea-pregunta"
        >
    </app-text-area>

    <app-input-text 
        label="Escribe la pregunta: " 
        name="titol" 
        [control]="titol" 
        placeholder="Tu pregunta aquí"
        errorMessage="{{ getErrorMessage(titol, 'Título') }}" 
        required="required">
    </app-input-text>
    
    <app-select 
        label="Puedes seleccionar una imagen: " 
        name="imatge" 
        [control]="imatge"
        placeholder="Selecciona una imagen" 
        required="none"
        [items]="imatges()">
    </app-select>



    
    <app-submit text="Guardar"></app-submit>
</form>
